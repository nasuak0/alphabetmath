    algebra:  { sym: 'Al', kind: 'Topic 01', name: 'Algebra',  cover: '#alg-rc2-cover' },
    geometry: { sym: 'Ge', kind: 'Topic 02', name: 'Geometry', cover: '#geo-cover-tz' },
    calculus: { sym: 'Ca', kind: 'Topic 03', name: 'Calculus', cover: '#cal-cover' },
    linalg:   { sym: 'La', kind: 'Topic 04', name: 'Linear Algebra', cover: '#la-cover' },
    numtheory:{ sym: 'Nt', kind: 'Topic 05', name: 'Number Theory', cover: '#nt-cover' },
    prob:     { sym: 'Pr', kind: 'Topic 06', name: 'Probability', cover: '#prob-cover' },
    analysis: { sym: 'An', kind: 'Topic 07', name: 'Analysis', cover: '#an-cover' },
    logic:    { sym: 'Lo', kind: 'Topic 08', name: 'Logic', cover: '#lg-cover' }
  };
  // ---- ingredient tables ----------------------------------------------
  // Adding a topic = one TOPICS line, one CARTS line, and its rail lists
  // below (which materials, in which order). The shelf, dropdowns and
  // captions all build themselves from these.
  var RAILS = {
    tile: {
      geometry: [
        { mat: 'flat',   variant: 'composed', label: 'Flat + Composed', cover: '#geo-tile-composed' }
      ],
      algebra: [
        { mat: 'flat',   variant: 'composed', label: 'Roots \u00b7 Nested Echo', cover: '#alg-rc2-tile-composed' }
      ],
      calculus: [
        { mat: 'flat',   variant: 'composed', label: 'Flat + Composed', cover: '#cal-tile-composed' }
      ],
      linalg: [
        { mat: 'flat',   variant: 'composed', label: 'Flat + Composed', cover: '#la-spiral-tile-composed' }
      ],
      numtheory: [
        { mat: 'flat',   variant: 'composed', label: 'Flat + Composed', cover: '#nt-tile-composed' }
      ],
      prob: [
        { mat: 'flat',   variant: 'composed', label: 'Flat + Composed', cover: '#prob-tile-composed' }
      ],
      analysis: [
        { mat: 'flat',   variant: 'composed', label: 'Flat + Composed', cover: '#an-tile-composed' }
      ],
      logic: [
        { mat: 'flat',   variant: 'composed', label: 'Flat + Composed', cover: '#lg-tile-composed' }
      ]
    },
    cartridge: {
      geometry: [
        { mat: 'flat',   variant: 'composed', label: 'Flat + Composed', cover: '#geo-cart-composed' }
      ],
      algebra: [
        { mat: 'flat',   variant: 'composed', label: 'Roots \u00b7 Nested Echo', cover: '#alg-rc2-cart-composed' }
      ],
      calculus: [
        { mat: 'flat',   variant: 'composed', label: 'Flat + Composed', cover: '#cal-cart-composed' }
      ],
      linalg: [
        { mat: 'flat',   variant: 'composed', label: 'Spiral \u00b7 Composed', cover: '#la-spiral-cart-composed' }
      ],
      numtheory: [
        { mat: 'flat',   variant: 'composed', label: 'Flat + Composed', cover: '#nt-cart-composed' }
      ],
      prob: [
        { mat: 'flat',   variant: 'composed', label: 'Flat + Composed', cover: '#prob-cart-composed' }
      ],
      analysis: [
        { mat: 'flat',   variant: 'composed', label: 'Flat + Composed', cover: '#an-cart-composed' }
      ],
      logic: [
        { mat: 'flat',   variant: 'composed', label: 'Flat + Composed', cover: '#lg-cart-composed' }
      ]
    }
  };
  var CARTS = {
    geometry: { kind: 'Interactive demo', name: 'Geometric Areas' },
    algebra:  { kind: 'Interactive demo', name: 'Balance Scales' },
    calculus: { kind: 'Interactive demo', name: 'Heat Equation' },
    linalg:   { kind: 'Interactive demo', name: 'Matrix Playground' },
    numtheory:{ kind: 'Interactive demo', name: 'Prime Spiral' },
    prob:     { kind: 'Interactive demo', name: 'Random Walks' },
    analysis: { kind: 'Interactive demo', name: 'Riemann sum' },
    logic:    { kind: 'Interactive demo', name: 'Truth Tables' }
  };
  var state = { kind: 'tile', topic: 'algebra', pick: 0 };
  var VCLASSES = ['composed'];    // every variant class a pick can carry

  function variants() { return RAILS[state.kind][state.topic]; }
  function picked() { return variants()[state.pick]; }

  // ---- rail generator: the shelf builds itself from the tables ----
  var sheet = document.querySelector('.sheet.two');
  var railKey = '';
  function buildRail() {
    var isCart = state.kind === 'cartridge';
    var t = TOPICS[state.topic], c = CARTS[state.topic];
    sheet.innerHTML = '';
    variants().forEach(function (v, i) {
      var cell = document.createElement('div');
      cell.className = 'cell';
      cell.setAttribute('data-idx', i);
      var w = document.createElement('div');
      w.className = v.variant ? 'tileWrap ' + v.variant : 'tileWrap';
      w.setAttribute('data-topic', state.topic);
      w.setAttribute('data-mat', v.mat);
      if (isCart) w.setAttribute('data-tkind', 'cartridge');
      w.innerHTML =
        '<div class="tile"><span class="badge"><span></span></span><div class="art">' +
        '<svg class="cover" viewBox="0 0 200 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true"><use href="' + (v.cover || t.cover) + '"/></svg>' +
        '<div class="tx"><div class="kind"></div><div class="name"></div></div>' +
        '</div></div>';
      w.querySelector('.badge span').textContent = t.sym;
      w.querySelector('.kind').textContent = isCart ? c.kind : t.kind;
      w.querySelector('.name').textContent = isCart ? c.name : t.name;
      cell.appendChild(w);
      sheet.appendChild(cell);
    });
  }

  function apply() {
    var isCart = state.kind === 'cartridge';
    if (isCart && !CARTS[state.topic]) { state.topic = 'geometry'; state.pick = 0; }
    var t = TOPICS[state.topic];
    var c = CARTS[state.topic];
    hero.setAttribute('data-topic', state.topic);
    var pk = picked();
    hero.setAttribute('data-mat', pk.mat);
    VCLASSES.forEach(function (c) { hero.classList.toggle(c, pk.variant === c); });
    hero.setAttribute('data-tkind', state.kind);
    hero.querySelector('.badge span').textContent = t.sym;
    hero.querySelector('.cover use').setAttribute('href', pk.cover || t.cover);
    hero.querySelector('.kind').textContent = isCart ? c.kind : t.kind;
    hero.querySelector('.name').textContent = isCart ? c.name : t.name;
    // Driver 1: the rail follows the Kind + Topic tweaks
    var comp = document.querySelector('.compare');
    comp.setAttribute('data-view', state.kind);
    comp.setAttribute('data-topic', state.topic);
    // (re)build the rail when Kind or Topic changed, then ring the pick
    var key = state.kind + '|' + state.topic;
    if (key !== railKey) { railKey = key; buildRail(); }
    sheet.querySelectorAll('.tileWrap').forEach(function (w, i) {
      w.classList.toggle('picked', i === state.pick);
    });
    // dropdowns: trigger labels + ✓ rows
    document.getElementById('matdropLabel').textContent = pk.label;
    buildMenu();
    buildTopicMenu();
    cap.innerHTML = '<b>' + (isCart ? c.name + ' · ' + c.kind : t.name) + ' · ' + pk.label + '</b>';
  }

  // ---- generic dropdown helpers (topic + material share the look) ----
  function wireDrop(el) {
    el.querySelector('.drop-btn').addEventListener('click', function (e) {
      e.stopPropagation();
      var was = el.classList.contains('open');
      closeDrops();
      el.classList.toggle('open', !was);
    });
  }
  function closeDrops() {
    document.querySelectorAll('.drop.open').forEach(function (d) { d.classList.remove('open'); });
  }
  function fillMenu(el, items, onIdx, cb) {
    var menu = el.querySelector('.drop-menu');
    menu.innerHTML = '';
    items.forEach(function (label, i) {
      var b = document.createElement('button');
      b.type = 'button';
      b.className = 'drop-item' + (i === onIdx ? ' on' : '');
      b.innerHTML = '<span class="ck">\u2713</span><span></span>';
      b.lastChild.textContent = label;
      b.addEventListener('click', function () { closeDrops(); cb(i); });
      menu.appendChild(b);
    });
  }

  // ---- material dropdown (checkmark popover) ----
  var drop = document.getElementById('matdrop');
  function buildMenu() {
    fillMenu(drop, variants().map(function (v) { return v.label; }), state.pick, function (i) {
      state.pick = i;
      apply();
    });
  }

  // ---- topic dropdown (same look) ----
  var topicDrop = document.getElementById('topicdrop');
  var TOPIC_IDS = Object.keys(TOPICS);
  function buildTopicMenu() {
    fillMenu(topicDrop, TOPIC_IDS.map(function (id) { return TOPICS[id].name; }),
      TOPIC_IDS.indexOf(state.topic), function (i) {
        state.topic = TOPIC_IDS[i];
        state.pick = 0;             // pick resets: the new rail may differ
        apply();
      });
    document.getElementById('topicdropLabel').textContent = TOPICS[state.topic].name;
  }

  wireDrop(drop);
  wireDrop(topicDrop);
  document.addEventListener('click', closeDrops);

  // ---- rail tap: pick the tapped tile ----
  document.querySelector('.compare').addEventListener('click', function (e) {
    var w = e.target.closest('.tileWrap');
    if (!w) return;
    var cell = w.closest('.cell');
    if (!cell) return;
    state.pick = +cell.getAttribute('data-idx');
    apply();
  });

  document.querySelectorAll('.seg').forEach(function (seg) {
    var key = seg.getAttribute('data-for');
    var btns = Array.prototype.slice.call(seg.querySelectorAll('button'));
    seg.style.setProperty('--n', btns.length);
    seg.addEventListener('click', function (e) {
      var b = e.target.closest('button');
      if (!b) return;
      seg.style.setProperty('--i', btns.indexOf(b));
      btns.forEach(function (x) { x.classList.toggle('on', x === b); });
      state[key] = b.getAttribute('data-val');
      state.pick = 0;               // pick resets: the new rail may differ
      closeDrops();
      apply();
    });
  });

  apply();
})();
</script>
</body>
</html>
