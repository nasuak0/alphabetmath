<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Design lab — screen layout study</title>
<link rel="stylesheet" href="../zmath/tokens.css" />
<link rel="stylesheet" href="flat-tile.css" />
<link rel="stylesheet" href="flat-lab.css" />
<style>
  /* ---- full-width centered stage (screen matches index.html Lab size) ---- */
  .page.wide { max-width: none; padding-left: clamp(24px, 4vw, 60px); padding-right: clamp(24px, 4vw, 60px); }
  .labplay { justify-content: center; padding: 0; background: transparent; border: 0;
    box-shadow: none; border-radius: 0; }
  .labplay .stageCol { flex: 1 1 auto; width: 100%; max-width: 980px; min-width: 0; margin: 0 auto; }

  /* ---- Tweaks: floating panel, hidden until the host Tweaks toggle ---- */
  .tweaks { display: none; position: fixed; right: 16px; bottom: 16px; z-index: 1000;
    width: 280px; max-height: calc(100vh - 32px); overflow-y: auto;
    flex: none; align-self: auto; }
  .tweaks.open { display: flex; }
  .tw-titlebar { display: flex; align-items: center; justify-content: space-between; cursor: grab; user-select: none; }
  .tw-titlebar:active { cursor: grabbing; }
  .tw-x { border: 0; background: transparent; font: inherit; font-size: 0.9rem; line-height: 1;
    color: var(--wii-ink-2); cursor: pointer; padding: 4px 6px; border-radius: 8px; }
  .tw-x:hover { background: rgba(40,50,80,0.08); color: var(--wii-ink); }
  a { color: var(--wii-ink); }
  a:hover { color: var(--wii-ink-2); }
</style>
</head>

    <defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#b18cff"/><stop offset="1" stop-color="#62d3e6"/></linearGradient></defs>
  </svg>
</template>

<script src="lab-scenes.js"></script>
<script>
(function () {
  var TAU = Math.PI * 2;

  /* ---- data (mirrors zmath/data.js) ---------------------------------- */
  var TOPICS = {
    geometry: { sym: 'Ge', name: 'Geometry',       c1: '#ffac5e', c2: '#e0702a', ink: '#bd5410', deep: '150,60,12' },
    algebra:  { sym: 'Al', name: 'Algebra',        c1: '#ff7a9c', c2: '#c2326b', ink: '#b51f57', deep: '110,20,55' },
    linalg:   { sym: 'La', name: 'Linear Algebra', c1: '#5b8def', c2: '#3147bc', ink: '#2a3db0', deep: '25,38,120' },
    numberth: { sym: 'Nt', name: 'Number Theory',  c1: '#2fd3b0', c2: '#159c7e', ink: '#0e7d64', deep: '8,95,75' },
    calculus: { sym: 'Ca', name: 'Calculus',       c1: '#ffce4d', c2: '#e0962a', ink: '#b0730f', deep: '140,90,10' },
    prob:     { sym: 'Pr', name: 'Probability',    c1: '#a06ee0', c2: '#6a36b5', ink: '#5e2ba6', deep: '74,30,120' }
  };
  var PROJECTS = [
    { id: 'p1', topic: 'geometry', scene: 'tiling',  title: 'Knot Atlas',        kind: 'Interactive', year: '2026', desc: 'Drag the strands of every prime knot up to nine crossings and watch its invariants update live.' },
    { id: 'p2', topic: 'linalg',   scene: 'vectors', title: 'Matrix Playground', kind: 'Interactive', year: '2026', desc: 'Compose transformations on the plane and see eigenvectors snap into place in real time.' },
    { id: 'p3', topic: 'numberth', scene: 'contour', title: 'Prime Spiral',      kind: 'Demo',        year: '2025', desc: 'The Ulam spiral, animated — pan across a million integers and find the hidden diagonals.' },
    { id: 'p4', topic: 'calculus', scene: 'curves',  title: 'Heat Equation',     kind: 'Demo',        year: '2025', desc: 'Set an initial temperature and watch the heat equation smooth it out, step by step.' },
    { id: 'p7', topic: 'algebra',  scene: 'tiling',  title: 'Balance Scales',    kind: 'Interactive', year: '2026', desc: 'Stack weights on either pan and discover what keeps an equation true.' },
    { id: 'p6', topic: 'prob',     scene: 'lattice', title: 'Random Walks',      kind: 'Demo',        year: '2024', desc: 'Race a thousand walkers and watch the bell curve assemble itself from pure chance.' }
  ];
  var PByID = {}; PROJECTS.forEach(function (p) { PByID[p.id] = p; });

  var LAYOUTS = [
    { id: 'cart-flat', short: 'C', name: 'Spotlight — flat cartridges' }
  ];

  var st = { layout: 'cart-flat', selId: 'p1', ghost: 'bold', chrome: 'live', details: false };

  function hex2rgb(h) { var n = parseInt(h.slice(1), 16); return ((n >> 16) & 255) + ',' + ((n >> 8) & 255) + ',' + (n & 255); }

  /* ---- markup helpers -------------------------------------------------- */
  function coverSvg(p) {
    return LabScenes.svg(p.scene, hex2rgb(TOPICS[p.topic].ink), false);
  }
  /* Composed material (Tile study's "Flat + Composed"): every cartridge
     wears its topic's composed ink art, words living inside the drawing. */
  var COVER = { geometry: 'geo', algebra: 'alg', linalg: 'la', numberth: 'nt', calculus: 'cal', prob: 'prob' };
  function composedCoverSvg(p, mini) {
    if (mini) {
      var ink = hex2rgb(TOPICS[p.topic].ink);
      var extra = p.topic === 'geometry' ? '--gs:rgba(224,112,42,0.9);--gst:rgba(232,130,62,0.82);--gw:2.6;' : '';
      return '<svg viewBox="14 14 172 172" preserveAspectRatio="xMidYMid slice" aria-hidden="true"' +
        ' style="' + extra + 'color:rgb(' + ink + ')"><use href="#' + COVER[p.topic] + '-cover"></use></svg>';
    }
    return '<svg viewBox="0 0 200 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true"><use href="#' + COVER[p.topic] + '-cart-composed"></use></svg>';
  }
  function ghostSvg(p) {
    /* geometry keeps its quiet line-art ghost */
    if (p.topic !== 'geometry') {
      return '<svg viewBox="0 0 200 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true"><use href="#' + COVER[p.topic] + '-cover"></use></svg>';
    }
    return coverSvg(p);
  }
  function tileHTML(p, w, h, sel, extra) {
    var t = TOPICS[p.topic];
    var flat = st.layout === 'cart-flat';
    var cover = composedCoverSvg(p, !sel);
    return '<div class="ptile ' + (extra || '') + ' fc' + (flat ? ' flat' : '') + (sel ? ' sel' : '') + '" data-id="' + p.id + '"' +
      ' style="--c1:' + t.c1 + ';--c2:' + t.c2 + ';--deep:' + (t.deep || hex2rgb(t.ink)) + ';width:' + w + 'px;height:' + h + 'px">' +
      '<span class="pring"></span>' +
      '<div class="pcard"><div class="coverwrap">' + cover + '</div></div>' +
      '<span class="psym"><span>' + t.sym + '</span></span></div>';
  }
  function statPill(label, val) { return '<span class="spill">' + label + ' <b>' + val + '</b></span>'; }
  function metaHTML(p, layout) {
    var t = TOPICS[p.topic];
    var h = '<div class="m-title">' + p.title + '</div>';
    var pills = statPill('Kind:', p.kind + ' · ' + p.year);
    h += '<div class="m-pills">' + pills + '</div>';
    h += '<p class="m-desc">' + p.desc + '</p>';
    return h;
  }
  function chromeHTML() {
    if (st.chrome === 'off') return '';
    var p = PByID[st.selId];
    var t = TOPICS[p.topic];
    return '<div class="cch l">' +
        '<button class="cbtn" type="button"><span class="g">B</span>Back</button>' +
        '<button class="cbtn act' + (st.details ? ' on' : '') + '" type="button" data-act="details"><span class="g">&minus;</span>Details</button></div>' +
      '<div class="cch r">' +
        '<button class="cbtn act" type="button" data-act="open"><span class="g">A</span>Open</button>' +
        '<button class="cbtn" type="button"><span class="g">+</span>Menu</button></div>' +
      '<div class="dcard' + (st.details ? ' open' : '') + '">' +
        '<div class="d-eyebrow" style="--ink:' + t.ink + '">' + t.name + ' · ' + p.kind + ' · ' + p.year + '</div>' +
        '<p class="d-body">' + p.desc + '</p></div>';
  }
  function ghostHTML(p) { return '<div class="ghost">' + ghostSvg(p) + '</div>'; }

  /* ---- lists + selection ---------------------------------------------- */
  function listFor() { return PROJECTS; }
  function clampSel() {
    var list = listFor();
    if (!list.some(function (p) { return p.id === st.selId; })) st.selId = list[0].id;
  }
  function selIdx() { var l = listFor(); for (var i = 0; i < l.length; i++) if (l[i].id === st.selId) return i; return 0; }

  /* ---- per-layout geometry --------------------------------------------- */
  var G = { v: { sm: 86, bg: 178, gap: 14 } };
  function colTransform(list, sel, sizes) {
    var y = 0, c = 0;
    for (var i = 0; i < list.length; i++) {
      var h = i === sel ? sizes.bg : sizes.sm;
      if (i === sel) c = y + h / 2;
      y += h + sizes.gap;
    }
    return 306 - c;
  }

  function railVHTML() {
    var list = listFor(), sel = selIdx(), s = G.v;
    var ty = colTransform(list, sel, s);
    var h = '<div class="railv"><div class="railcol" style="transform:translateY(' + ty.toFixed(1) + 'px)">';
    list.forEach(function (p, i) {
      var z = i === sel ? s.bg : s.sm;
      h += tileHTML(p, Math.round(z * 1.9), z, i === sel, 'cart');
    });
    return h + '</div></div>';
  }

  /* ---- screen renderer -------------------------------------------------- */
  function screenHTML(layout) {
    var p = PByID[st.selId];
    var h = '<div class="scr" data-layout="' + layout + '" data-ghost="' + st.ghost +
      '" data-chrome="' + st.chrome + '">';
    h += ghostHTML(p);
    h += railVHTML() + '<div class="meta">' + metaHTML(p, layout) + '</div>';
    h += chromeHTML();
    return h + '</div>';
  }

  /* ---- hero: build vs incremental sync (keeps rail transitions alive) --- */
  var hero = document.getElementById('hero');
  var heroKey = '';
  function structKey() {
    return [st.layout, st.ghost, st.chrome].join('|');
  }
  function buildHero() { hero.innerHTML = screenHTML(st.layout); wireHero(); }
  function syncHero() {
    var scr = hero.querySelector('.scr');
    if (!scr) return buildHero();
    var p = PByID[st.selId], list = listFor(), sel = selIdx();
    var s = G.v;
    scr.querySelectorAll('.railcol > .ptile').forEach(function (el, i) {
      var on = i === sel, z = on ? s.bg : s.sm;
      var was = el.classList.contains('sel');
      el.classList.toggle('sel', on);
      el.style.width = Math.round(z * 1.9) + 'px'; el.style.height = z + 'px';
      if (was !== on) {
        var cw = el.querySelector('.coverwrap');
        if (cw) cw.innerHTML = composedCoverSvg(PByID[el.getAttribute('data-id')], !on);
      }
    });
    var col = scr.querySelector('.railcol');
    if (col) col.style.transform = 'translateY(' + colTransform(list, sel, s).toFixed(1) + 'px)';
    var meta = scr.querySelector('.meta');
    if (meta) { var m2 = meta.cloneNode(false); m2.innerHTML = metaHTML(p, st.layout); meta.replaceWith(m2); }
    var gh = scr.querySelector('.ghost');
    if (gh) gh.innerHTML = ghostSvg(p);
    var old = scr.querySelector('.dcard'); var ch = chromeHTML();
    if (st.chrome !== 'off') {
      scr.querySelectorAll('.cch, .dcard').forEach(function (n) { n.remove(); });
      scr.insertAdjacentHTML('beforeend', ch); wireChrome(scr);
    }
  }
  function pulseSel() {
    var el = hero.querySelector('.ptile.sel');
    if (!el) return;
    el.classList.remove('pulse'); void el.offsetWidth; el.classList.add('pulse');
    el.addEventListener('animationend', function () { el.classList.remove('pulse'); }, { once: true });
  }
  function wireChrome(scr) {
    scr.querySelectorAll('.cbtn.act').forEach(function (b) {
      b.addEventListener('click', function () {
        if (st.chrome !== 'live') return;
        if (b.getAttribute('data-act') === 'details') { st.details = !st.details; apply(); }
        else pulseSel();
      });
    });
  }
  function wireHero() {
    var scr = hero.querySelector('.scr');
    scr.addEventListener('click', function (e) {
      if (e.target.closest('.cbtn')) return;
      var it = e.target.closest('.ptile');
      if (!it) return;
      var id = it.getAttribute('data-id');
      if (id === st.selId) pulseSel(); else { st.selId = id; apply(); }
    });
    wireChrome(scr);
  }

  function onLayoutChange() {
    clampSel();
  }

  /* ---- tweak wiring ------------------------------------------------------ */
  var drop = document.getElementById('laydrop');
  drop.querySelector('.drop-btn').addEventListener('click', function (e) {
    e.stopPropagation(); drop.classList.toggle('open');
  });
  function closeDrops() { drop.classList.remove('open'); }
  document.addEventListener('click', closeDrops);
  function buildLayMenu() {
    var menu = drop.querySelector('.drop-menu');
    menu.innerHTML = '';
    LAYOUTS.forEach(function (L) {
      var b = document.createElement('button');
      b.type = 'button';
      b.className = 'drop-item' + (L.id === st.layout ? ' on' : '');
      b.innerHTML = '<span class="ck">\u2713</span><span></span>';
      b.lastChild.textContent = L.name;
      b.addEventListener('click', function () { closeDrops(); st.layout = L.id; onLayoutChange(); apply(); });
      menu.appendChild(b);
    });
    document.getElementById('laydropLabel').textContent =
      LAYOUTS.find(function (L) { return L.id === st.layout; }).name;
  }

  /* ---- keyboard ----------------------------------------------------------- */
  document.addEventListener('keydown', function (e) {
    if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].indexOf(e.key) < 0) return;
    e.preventDefault();
    var back = e.key === 'ArrowUp' || e.key === 'ArrowLeft';
    var list = listFor(), j = selIdx();
    st.selId = list[(j + (back ? -1 : 1) + list.length) % list.length].id;
    apply();
  });

  /* ---- scale ---------------------------------------------------------------- */
  var wrap = document.getElementById('heroScale');
  function fit() {
    var w = wrap.clientWidth, sc = Math.min(1, w / 980);
    var scr = hero.querySelector('.scr');
    if (scr) scr.style.transform = 'scale(' + sc + ')';
    wrap.style.height = (612 * sc) + 'px';
  }
  window.addEventListener('resize', fit);

  /* ---- floating Tweaks panel: host protocol + drag ------------------------- */
  var panel = document.querySelector('.tweaks');
  function setPanel(open) { panel.classList.toggle('open', open); }
  window.addEventListener('message', function (e) {
    var t = e && e.data && e.data.type;
    if (t === '__activate_edit_mode') setPanel(true);
    else if (t === '__deactivate_edit_mode') setPanel(false);
  });
  window.parent.postMessage({ type: '__edit_mode_available' }, '*');
  document.getElementById('twClose').addEventListener('click', function () {
    setPanel(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  });
  (function () {
    var PAD = 16;
    var drag = document.getElementById('twDrag');
    drag.addEventListener('mousedown', function (e) {
      if (e.target.closest('.tw-x')) return;
      e.preventDefault();
      var r = panel.getBoundingClientRect();
      var sx = e.clientX, sy = e.clientY;
      var startRight = window.innerWidth - r.right;
      var startBottom = window.innerHeight - r.bottom;
      function move(ev) {
        var x = startRight - (ev.clientX - sx);
        var y = startBottom - (ev.clientY - sy);
        x = Math.min(Math.max(PAD, x), Math.max(PAD, window.innerWidth - panel.offsetWidth - PAD));
        y = Math.min(Math.max(PAD, y), Math.max(PAD, window.innerHeight - panel.offsetHeight - PAD));
        panel.style.right = x + 'px'; panel.style.bottom = y + 'px';
      }
      function up() {
        window.removeEventListener('mousemove', move);
        window.removeEventListener('mouseup', up);
      }
      window.addEventListener('mousemove', move);
      window.addEventListener('mouseup', up);
    });
  })();

  /* ---- apply ---------------------------------------------------------------- */
  var cap = document.getElementById('statecap');
  function apply() {
    clampSel();
    var key = structKey();
    if (key !== heroKey) { heroKey = key; buildHero(); } else { syncHero(); }
    buildLayMenu();
    fit();
    var L = LAYOUTS.find(function (x) { return x.id === st.layout; });
    cap.innerHTML = '<b>' + L.name + ' — ' + PByID[st.selId].title + '</b>';
  }

  apply();
})();
</script>
</body>
</html>
